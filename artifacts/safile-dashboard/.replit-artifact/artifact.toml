kind = "web"
previewPath = "/"
title = "SAFILE Dashboard"
version = "1.0.0"
id = "artifacts/safile-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20810

[services.development]
run = "pnpm --filter @workspace/safile-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/safile-dashboard", "run", "build" ]
publicDir = "artifacts/safile-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20810"
BASE_PATH = "/"
